    <script>
        async function getIP() {
            const btn = document.getElementById('ipBtn');
            btn.innerText = "FETCHING...";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                btn.innerText = data.ip;
            } catch (err) {
                btn.innerText = "ERROR";
            }
        }
    </script>
