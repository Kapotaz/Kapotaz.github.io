<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE // ENGINEER</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Inter:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Subtle Noise/Grain Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 50;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png')
        }

        .card {
            width: 90%;
            max-width: 500px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: left;
            position: relative;
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #3b82f6;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1rem;
            line-height: 1.8;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 0.8rem 1.5rem;
            background: transparent;
            border: 1px solid #e0e0e0;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: #e0e0e0;
            color: #050505;
        }

        /* Decorative glow */
        .glow {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15), transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div class="card">
        <span class="tag">SECURITY_ENGINEER.V2</span>
        <h1>Defensive Architecture.</h1>
        <p>Focused on adversarial simulation and red teaming. Specializing in vulnerability research, exploit development, and identifying critical weaknesses in enterprise-grade software before they are weaponized.</p>
        <button class="btn" id="ipBtn" onclick="getIP()">[ TEST ME ]</button>
    </div>

    <script>
        async function getIP() {
            const btn = document.getElementById('ipBtn');
            btn.innerText = "FETCHING...";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                btn.innerText = data.ip;
            } catch (err) {
                btn.innerText = "ERROR";
            }
        }
    </script>
</body>
</html>
